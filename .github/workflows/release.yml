name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          mkdir -p dist
          GOOS=linux  GOARCH=amd64 go build -o dist/metar-tool-linux-amd64  .
          GOOS=darwin GOARCH=amd64 go build -o dist/metar-tool-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o dist/metar-tool-darwin-arm64 .

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
