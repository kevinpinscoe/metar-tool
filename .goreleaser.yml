# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - id: metar-tool
    main: .
    binary: metar-tool
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}
    env:
      - CGO_ENABLED=0

archives:
  - id: metar-tool-archive
    builds: [metar-tool]
    name_template: "metar-tool-{{ .Os }}-{{ .Arch }}"
    format: binary

nfpms:
  - id: metar-tool-packages
    package_name: metar-tool
    vendor: Kevin P. Inscoe
    homepage: https://github.com/kevinpinscoe/metar-tool
    maintainer: Kevin P. Inscoe <kevin.inscoe@gmail.com>
    description: METAR aviation weather decoder
    license: MIT
    formats: [deb, rpm]
    bindir: /usr/bin
    builds: [metar-tool]

brews:
  - name: metar-tool
    repository:
      owner: kevinpinscoe
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/kevinpinscoe/metar-tool
    description: METAR aviation weather decoder
    license: MIT
    test: |
      system "#{bin}/metar-tool", "--help"

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    certificate: ${artifact}.pem
    signature: ${artifact}.sig
    output: true

release:
  github:
    owner: kevinpinscoe
    name: metar-tool
  name_template: "v{{ .Version }}"
  make_latest: true
  generate_release_notes: true
